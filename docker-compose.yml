version: "3.8"

services:
  frontend:
    image: nginx:alpine
    container_name: nginx-frontend
    ports:
      - "80:80"
    volumes:
      # Serverga borgan tayyor statik fayllarni to'g'ridan-to'g'ri nginx-ga ulaymiz
      - ./frontend:/usr/share/nginx/html
    restart: always

  backend:
    image: eclipse-temurin:17-jdk
    container_name: spring-backend
    ports:
      - "8080:8080"
    volumes:
      # Kompyuterda tayyor bo'lgan jar faylni shundoq konteyner ichiga tashlaymiz
      - ./build/libs:/app
    working_dir: /app
    # Konteyner ichida jar-ni to'g'ridan-to'g'ri yurgizamiz
    command: java -jar Networking-0.0.1-SNAPSHOT.jar
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/hotel_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres

  db:
    image: postgres:17
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_DB: hotel_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"