<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wholesale Nexus | Cloud ERP · CRM · WMS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; color: #0f172a; }
        .auth-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); padding: 20px; }
        .auth-card { background: white; border-radius: 32px; padding: 48px; width: 100%; max-width: 480px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
        .auth-card h1 { font-size: 2rem; font-weight: 700; background: linear-gradient(135deg, #0f172a, #3b82f6); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: #334155; }
        .form-group input { width: 100%; padding: 12px 16px; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 1rem; }
        .auth-btn { width: 100%; padding: 14px; background: #0f172a; color: white; border: none; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 12px; }
        .auth-link { text-align: center; margin-top: 24px; color: #64748b; }
        .auth-link a { color: #3b82f6; text-decoration: none; cursor: pointer; }
        .app-wrapper { display: flex; min-height: 100vh; }
        .sidebar { width: 280px; background: linear-gradient(180deg, #0f172a 0%, #0a0f1c 100%); color: #e2e8f0; position: fixed; height: 100vh; }
        .logo-area { padding: 32px 24px; border-bottom: 1px solid #1e293b; }
        .logo-area h2 { font-size: 1.5rem; font-weight: 700; background: linear-gradient(135deg, #fff, #94a3b8); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .nav-menu { padding: 20px 16px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; margin-bottom: 8px; cursor: pointer; color: #94a3b8; }
        .nav-item.active { background: #1e293b; color: white; }
        .main-content { flex: 1; margin-left: 280px; }
        .top-bar { background: white; padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; }
        .page-title { font-size: 1.5rem; font-weight: 700; color: #0f172a; }
        .logout-btn { background: none; border: none; cursor: pointer; display: flex; align-items: center; gap: 8px; color: #64748b; padding: 8px 16px; border-radius: 8px; }
        .logout-btn:hover { background: #f1f5f9; color: #dc2626; }
        .content-area { padding: 32px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 24px; margin-bottom: 32px; }
        .stat-card { background: white; border-radius: 20px; padding: 24px; border: 1px solid #e2e8f0; }
        .stat-card .label { font-size: 0.8rem; text-transform: uppercase; font-weight: 600; color: #64748b; }
        .stat-card .value { font-size: 2.5rem; font-weight: 700; margin-top: 12px; color: #0f172a; }
        .module-panel { background: white; border-radius: 20px; padding: 24px; margin-bottom: 32px; border: 1px solid #e2e8f0; }
        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-primary { background: #0f172a; color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #e2e8f0; }
        th { background: #f8fafc; font-weight: 600; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
        .badge-success { background: #dcfce7; color: #166534; }
        .customer-grid, .inventory-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .customer-card, .inventory-item { border: 1px solid #e2e8f0; border-radius: 16px; padding: 16px; }
        @media (max-width: 768px) { .sidebar { width: 80px; } .sidebar span { display: none; } .main-content { margin-left: 80px; } }
    </style>
</head>
<body>
<div id="app"></div>

<script>
    const API_BASE = 'http://localhost:8080';
    let currentUser = JSON.parse(localStorage.getItem('user'));
    let currentTab = 'dashboard';

    const DEMO_ERP_ORDERS = [
        { id: 'PO-10045', customer: 'Fashion Hub Wholesale', date: '2025-02-15', status: 'Shipped', total: 24750 },
        { id: 'PO-10046', customer: 'Urban Collection Ltd', date: '2025-02-14', status: 'Processing', total: 18900 }
    ];

    const DEMO_CRM_CUSTOMERS = [
        { id: 1, company: 'Fashion Hub Wholesale', contact: 'Michael Chen', email: 'michael@fashionhub.com', type: 'Gold Partner', lastActivity: '2025-02-15', status: 'Active' },
        { id: 2, company: 'Urban Collection Ltd', contact: 'Sarah Johnson', email: 'sarah@urbancollection.com', type: 'Wholesale', lastActivity: '2025-02-14', status: 'Active' }
    ];

    const DEMO_WMS_INVENTORY = [
        { sku: 'WH-POLO-001', name: 'Premium Cotton Polo', category: 'Tops', quantity: 450, location: 'A-12-01', status: 'In Stock', reorderLevel: 100 },
        { sku: 'WH-DENIM-002', name: 'Slim Fit Jeans', category: 'Bottoms', quantity: 128, location: 'B-07-03', status: 'Low Stock', reorderLevel: 150 }
    ];

    let erpOrders = [...DEMO_ERP_ORDERS];
    let crmCustomers = [...DEMO_CRM_CUSTOMERS];
    let wmsInventory = [...DEMO_WMS_INVENTORY];
    let dispatchItems = [];

    function renderDashboard() {
        const totalInventory = wmsInventory.reduce((sum, item) => sum + (item.quantity || 0), 0);
        const activeCustomers = crmCustomers.filter(c => c.status === 'Active').length;
        const pendingOrders = erpOrders.filter(o => o.status === 'Processing').length;

        const html = `
                <div class="stats-grid">
                    <div class="stat-card"><div class="label">Total Inventory</div><div class="value">${totalInventory}</div></div>
                    <div class="stat-card"><div class="label">Active Customers</div><div class="value">${activeCustomers}</div></div>
                    <div class="stat-card"><div class="label">Pending Orders</div><div class="value">${pendingOrders}</div></div>
                    <div class="stat-card"><div class="label">System Status</div><div class="value"><span class="badge badge-success">Online</span></div></div>
                </div>
                <div class="module-panel"><div class="panel-header"><h3>Cloud System Health</h3></div>
                <div><span class="badge badge-success">Backend: Online</span> <span class="badge badge-success">Database: Connected</span></div></div>
            `;
        document.querySelector('.content-area').innerHTML = html;
    }

    function renderERP() {
        const html = `
                <div class="module-panel">
                    <div class="panel-header"><h3>ERP Order Processing</h3><button class="btn-primary" id="createOrderBtn">+ Create Order</button></div>
                    <table><thead><tr><th>Order ID</th><th>Customer</th><th>Date</th><th>Status</th><th>Total</th></tr></thead>
                    <tbody>${erpOrders.map(o => `<tr><td>${o.id}</td><td>${o.customer}</td><td>${o.date}</td><td><span class="badge badge-success">${o.status}</span></td><td>$${o.total}</td></tr>`).join('')}</tbody>
                </table>
                </div>
            `;
        document.querySelector('.content-area').innerHTML = html;
        document.getElementById('createOrderBtn')?.addEventListener('click', () => alert('Create ERP Order'));
    }

    function renderCRM() {
        const html = `
                <div class="module-panel">
                    <div class="panel-header"><h3>CRM Customer Management</h3><button class="btn-primary" id="addCustomerBtn">+ Add Customer</button></div>
                    <div class="customer-grid">${crmCustomers.map(c => `
                        <div class="customer-card"><h4>${c.company}</h4><div>${c.contact}</div><div>${c.email}</div><div>${c.type}</div><span class="badge badge-success">${c.status}</span></div>
                    `).join('')}</div>
                </div>
            `;
        document.querySelector('.content-area').innerHTML = html;
    }

    function renderWMS() {
        const html = `
                <div class="module-panel">
                    <div class="panel-header"><h3>WMS Inventory</h3><button class="btn-primary" id="addInventoryBtn">+ Add Stock</button></div>
                    <div class="inventory-grid">${wmsInventory.map(i => `
                        <div class="inventory-item"><h4>${i.name}</h4><div>SKU: ${i.sku}</div><div>Qty: ${i.quantity}</div><div>Location: ${i.location}</div><span class="badge badge-success">${i.status}</span></div>
                    `).join('')}</div>
                </div>
            `;
        document.querySelector('.content-area').innerHTML = html;
    }

    function renderDispatch() {
        const html = `<div class="module-panel"><div class="panel-header"><h3>Dispatch List</h3><button class="btn-primary" id="createDispatchBtn">Create Dispatch</button></div>
                ${dispatchItems.length === 0 ? '<p style="text-align:center;padding:40px;">No items in dispatch list</p>' : '<table>...</table>'}
            </div>`;
        document.querySelector('.content-area').innerHTML = html;
    }

    function renderCurrentView() {
        if (currentTab === 'dashboard') renderDashboard();
        else if (currentTab === 'erp') renderERP();
        else if (currentTab === 'crm') renderCRM();
        else if (currentTab === 'wms') renderWMS();
        else if (currentTab === 'dispatch') renderDispatch();
        document.querySelector('.page-title').innerText = currentTab.toUpperCase();
    }

    function showLoginPage() {
        document.getElementById('app').innerHTML = `
                <div class="auth-container">
                    <div class="auth-card">
                        <h1>Wholesale Nexus</h1>
                        <div class="subtitle">Cloud ERP · CRM · WMS Portal</div>
                        <form id="loginForm">
                            <div class="form-group"><label>Email</label><input type="email" id="email" required placeholder="admin@wholesale.com"></div>
                            <div class="form-group"><label>Password</label><input type="password" id="password" required placeholder="••••••••"></div>
                            <button type="submit" class="auth-btn">Sign In</button>
                        </form>
                        <div class="auth-link"><a id="showRegister">Create Account</a></div>
                    </div>
                </div>
            `;

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            currentUser = { name: 'Admin', email: email };
            localStorage.setItem('user', JSON.stringify(currentUser));
            initApp();
        });

        document.getElementById('showRegister').addEventListener('click', (e) => {
            e.preventDefault();
            alert('Demo mode: Use any credentials to login');
        });
    }

    function initApp() {
        document.getElementById('app').innerHTML = `
                <div class="app-wrapper">
                    <div class="sidebar">
                        <div class="logo-area"><h2>Wholesale Nexus</h2><p>Cloud ERP · CRM · WMS</p></div>
                        <div class="nav-menu">
                            <div class="nav-item active" data-tab="dashboard"><i class="fas fa-tachometer-alt"></i> <span>Dashboard</span></div>
                            <div class="nav-item" data-tab="erp"><i class="fas fa-chart-line"></i> <span>ERP · Orders</span></div>
                            <div class="nav-item" data-tab="crm"><i class="fas fa-users"></i> <span>CRM · Customers</span></div>
                            <div class="nav-item" data-tab="wms"><i class="fas fa-warehouse"></i> <span>WMS · Inventory</span></div>
                            <div class="nav-item" data-tab="dispatch"><i class="fas fa-truck-fast"></i> <span>Dispatch List</span></div>
                        </div>
                    </div>
                    <div class="main-content">
                        <div class="top-bar">
                            <div class="page-title">Dashboard</div>
                            <div class="user-menu">
                                <span><i class="fas fa-user-circle"></i> ${currentUser?.name || 'Admin'}</span>
                                <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
                            </div>
                        </div>
                        <div class="content-area"></div>
                    </div>
                </div>
            `;

        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                item.classList.add('active');
                currentTab = item.getAttribute('data-tab');
                renderCurrentView();
            });
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('user');
            currentUser = null;
            showLoginPage();
        });

        renderCurrentView();
    }

    if (currentUser) {
        initApp();
    } else {
        showLoginPage();
    }
</script>
</body>
</html>
